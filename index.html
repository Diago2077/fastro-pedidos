<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>FASTRO — Sistema de Pedidos</title>
  <link rel="icon" href="assets/favicon.png?v=2" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ========== LOGIN ========== -->
<div id="login-screen">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-logo-wrap">
      <img src="assets/logo.png" alt="FASTRO" class="login-logo">
    </div>
    <p class="login-sub">Sistema de Pedidos</p>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input type="email" id="login-email" class="form-control" placeholder="correo@fastro.com"
          required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <div class="input-group">
          <input type="password" id="login-password" class="form-control" placeholder="••••••••"
            required autocomplete="current-password">
          <button type="button" id="toggle-pwd" class="input-addon" tabindex="-1">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>
      <div id="login-error" class="alert alert-danger hidden"></div>
      <button type="submit" class="btn btn-accent btn-full mt-2">
        <i class="fas fa-sign-in-alt"></i>&nbsp; Ingresar
      </button>
    </form>
    <p class="login-footer">FASTRO S.A. &copy; 2026</p>
  </div>
</div>

<!-- ========== APP ========== -->
<div id="app" class="hidden app-layout">

  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-brand">
      <img src="assets/logo.png" alt="FASTRO" class="sidebar-logo">
      <button id="sidebar-close" class="icon-btn sidebar-close-btn"><i class="fas fa-times"></i></button>
    </div>

    <nav class="sidebar-nav">
      <a href="#dashboard" class="nav-link" data-section="dashboard">
        <i class="fas fa-tachometer-alt"></i><span>Dashboard</span>
      </a>
      <a href="#orders" class="nav-link" data-section="orders">
        <i class="fas fa-file-invoice"></i><span>Pedidos</span>
      </a>
      <a href="#clients" class="nav-link admin-only" data-section="clients">
        <i class="fas fa-store"></i><span>Clientes</span>
      </a>
      <a href="#products" class="nav-link" data-section="products">
        <i class="fas fa-boxes"></i><span>Productos</span>
      </a>
      <a href="#providers" class="nav-link" data-section="providers">
        <i class="fas fa-truck"></i><span>Proveedores</span>
      </a>
      <div class="sidebar-divider"></div>
      <a href="#reports" class="nav-link" data-section="reports">
        <i class="fas fa-chart-bar"></i><span>Reportes</span>
      </a>
      <a href="#users" class="nav-link admin-only" data-section="users">
        <i class="fas fa-users-cog"></i><span>Usuarios</span>
      </a>
      <a href="#settings" class="nav-link admin-only" data-section="settings">
        <i class="fas fa-sliders-h"></i><span>Configuración</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-pill">
        <div class="user-avatar" id="user-avatar">A</div>
        <div class="user-meta">
          <div class="user-name" id="sidebar-user-name">–</div>
          <div class="user-role" id="sidebar-user-role">–</div>
        </div>
      </div>
      <button class="icon-btn" id="logout-btn" title="Cerrar sesión">
        <i class="fas fa-sign-out-alt"></i>
      </button>
    </div>
  </aside>

  <!-- SIDEBAR OVERLAY (mobile) -->
  <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>

  <!-- MAIN -->
  <div class="main-wrapper">
    <header class="topbar">
      <button id="sidebar-open" class="icon-btn"><i class="fas fa-bars"></i></button>
      <h1 class="page-title" id="page-title">Dashboard</h1>
      <div id="topbar-actions"></div>
    </header>
    <main id="content-area" class="content-area"></main>
  </div>

  <!-- BOTTOM NAV (mobile/tablet) -->
  <nav class="bottom-nav">
    <a class="bottom-nav-link nav-link" data-section="dashboard"><i class="fas fa-tachometer-alt"></i><span>Inicio</span></a>
    <a class="bottom-nav-link nav-link" data-section="orders"><i class="fas fa-file-invoice"></i><span>Pedidos</span></a>
    <a class="bottom-nav-link nav-link" data-section="products"><i class="fas fa-boxes"></i><span>Productos</span></a>
    <a class="bottom-nav-link nav-link" data-section="clients"><i class="fas fa-store"></i><span>Clientes</span></a>
    <button class="bottom-nav-link" id="bottom-more" type="button"><i class="fas fa-ellipsis-h"></i><span>Más</span></button>
  </nav>

</div>

<!-- ========== MODAL ========== -->
<div id="modal-backdrop" class="modal-backdrop hidden"></div>
<div id="modal" class="modal hidden">
  <div class="modal-dialog" id="modal-dialog">
    <div class="modal-header">
      <h4 class="modal-title" id="modal-title"></h4>
      <button class="icon-btn" id="modal-close"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- ========== TOASTS ========== -->
<div id="toast-container"></div>

<!-- ========== SCRIPTS ========== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
