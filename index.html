<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>FASTRO S.A.</title>

  <!-- Tema (aplicado antes de pintar para evitar parpadeo) -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('fastro_theme');
        if (t !== 'dark' && t !== 'light') {
          t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
  <link rel="icon" href="assets/favicon.png?v=2" type="image/png">

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#ffffff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="FASTRO">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">

<body>

<!-- ========== LOGIN ========== -->
<div id="login-screen">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-logo-wrap">
      <img src="assets/logo.png" alt="FASTRO" class="login-logo">
    </div>
    <p class="login-sub">Sistema de Pedidos</p>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input type="email" id="login-email" class="form-control" placeholder="correo@fastro.com"
          required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <div class="input-group">
          <input type="password" id="login-password" class="form-control" placeholder="••••••••"
            required autocomplete="current-password">
          <button type="button" id="toggle-pwd" class="input-addon" tabindex="-1">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>
      <div id="login-error" class="alert alert-danger hidden"></div>
      <button type="submit" class="btn btn-accent btn-full mt-2">
        <i class="fas fa-sign-in-alt"></i>&nbsp; Ingresar
      </button>
    </form>
    <p class="login-footer">FASTRO S.A. &copy; 2026</p>
  </div>
</div>

<!-- PWA: registrar service worker + gestor de actualizaciones -->
<script>
  // Gestor de actualización expuesto a la app (botón "Actualizar" + banner)
  window.AppUpdate = {
    reg: null,
    updateReady: false,

    // Forzar: des-registra el SW, borra toda la caché y recarga sin caché.
    // Es la opción "nuclear" para iPads/celulares que se quedan pegados.
    async force() {
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((r) => r.unregister()));
        }
        if (window.caches) {
          const keys = await caches.keys();
          await Promise.all(keys.map((k) => caches.delete(k)));
        }
      } catch (e) { /* seguimos igual con la recarga */ }
      const u = new URL(window.location.href);
      u.searchParams.set('_v', Date.now());        // rompe la caché HTTP del navegador
      window.location.replace(u.toString());
    },

    // Aplicar la versión en espera (cuando el usuario toca "Actualizar" en el banner)
    applyWaiting() {
      const w = this.reg && this.reg.waiting;
      if (w) w.postMessage('SKIP_WAITING');          // el SW activa → controllerchange recarga
      else window.location.reload();
    }
  };

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
      try {
        const reg = await navigator.serviceWorker.register('sw.js');
        window.AppUpdate.reg = reg;

        const announce = () => {
          window.AppUpdate.updateReady = true;
          window.dispatchEvent(new Event('fastro:update-available'));
        };

        // Ya hay un SW nuevo esperando (entraste y había update pendiente)
        if (reg.waiting && navigator.serviceWorker.controller) announce();

        // Se descargó un SW nuevo mientras la app estaba abierta
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) announce();
          });
        });

        // Revisar updates cada 30 min mientras la app esté abierta
        setInterval(() => reg.update().catch(() => {}), 30 * 60 * 1000);
      } catch (err) {
        console.warn('SW no registrado:', err);
      }
    });

    // Recargar al cambiar de SW, pero NO en la primera instalación (sin controller previo)
    const _hadController = navigator.serviceWorker.controller != null;
    let _reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (_reloaded || !_hadController) return;
      _reloaded = true;
      window.location.reload();
    });
  }
</script>

</body>
</html>
